version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adops-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://adops:adops_secret@postgres:5432/adops_db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - adops-network
    restart: unless-stopped
    volumes:
      - ./datasets:/app/datasets
      - ./knowledge_base:/app/knowledge_base

  postgres:
    image: postgres:15-alpine
    container_name: adops-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=adops
      - POSTGRES_PASSWORD=adops_secret
      - POSTGRES_DB=adops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - adops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adops -d adops_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: adops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - adops-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: adops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - adops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: adops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - adops-network
    restart: unless-stopped

networks:
  adops-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
